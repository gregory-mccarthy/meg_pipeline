# ============================================================
# MEG/EEG Preprocessing Configuration - Local Processing Mode
# ============================================================
# Local workflow: data already available on this machine.
# No remote fetch/push. Single-machine processing.
# ============================================================

# Example raw file:
# /Users/gm33/data/faces/sub-004/ses-01/meg/sub-004_ses-01_task-temphierarchy_run-01_meg.fif

# ============================================================
# BIDS DATASET IDENTIFIERS
# ============================================================
subject: "004"
session: "01"
run: "01"
task: "temphierarchy"

# Local BIDS root (edit this)
bids_root: /Users/gm33/data/faces

# If you want to analyze a subset of the recording, uncomment:
# time_window:
#   start: null   # e.g., "20:00" (20 min), 1200, or null to start at 0 s
#   end:   null   # e.g., "30:00" (30 min), 1800, or null to go to recording end

# ============================================================
# LOCAL PROCESSING I/O (REMOTE DISABLED)
# ============================================================
remote_io:
  enabled: false
  hpc_host: null
  hpc_user: null
  remote_bids_root: null
  local_temp_dir: ./temp

# ============================================================
# MAXWELL FILTERING (tSSS) CALIBRATION
# ============================================================
# These can be relative to your project root, or absolute paths.
calibration_file: /Users/gm33/data/cals/sss_cal_factory_20230619.dat
cross_talk_file: /Users/gm33/data/cals/ct_sparse_triux2.fif

# ============================================================
# BASIC SIGNAL PROCESSING
# ============================================================
head_movement:
  enabled: true

line_freq: 60.0
stim_include_mask: "0xFFFF"
head_position_origin: null

# ============================================================
# TRIGGERS
# ============================================================
triggers:
  stim_channel: "STI101"
  mask: "0xFFFF"        # keep as string so 0x.. parses cleanly
  max_settle_ms: 6.0
  refractory_ms: 20.0
  auto_mask_stuck_bits: false
  stuck_high_frac: 0.98
  stuck_low_frac: 0.02

# ============================================================
# EEG MONTAGE CONFIGURATION
# ============================================================
eeg_handling:
  montage: null

# ============================================================
# INTERACTIVE PROCESSING CONTROLS
# ============================================================
interactive_bad_channels: true
interactive_ica: true

# ============================================================
# MANUAL OVERRIDES
# ============================================================
manual_bad_channels: []
ica_exclude_eeg: []
ica_exclude_meg: []

# ============================================================
# AUTOREJECT ARTIFACT DETECTION
# ============================================================
autoreject:
  enabled: true
  which_types: [mag]
  filter:
    highpass: 1.0
    lowpass: 40.0
    resample_hz: null
  epoch:
    duration: 2.0
    tmin: 0.0
    tmax: 2.0
  cv_folds: 7
  thresh_method: "random_search"
  # thresh_method: "bayesian_optimization"
  n_interpolate: [0]
  verbose: true
  consensus_thresh: 0.3
  global_epoch_thresh: 0.5

# ============================================================
# INDEPENDENT COMPONENT ANALYSIS (ICA)
# ============================================================
ica_preprocessing:
  eeg:
    highpass: 1.0
    lowpass: 40.0
    resample_hz: 200
    max_ica_duration_sec: 1800
    interactive: true
    random_state: 97
  meg:
    highpass: 1.0
    lowpass: 40.0
    resample_hz: 200
    max_ica_duration_sec: 1800
    interactive: true
    random_state: 97

# ============================================================
# FINAL OUTPUT PROCESSING
# ============================================================
final_filter:
  highpass: null
  lowpass: null
  resample_hz: null
  drop_channel_types:
    - hpi
    - hlc
    - coil

# ============================================================
# CHECKPOINT AND RESUME SYSTEM
# ============================================================
checkpoint:
  enabled: true
  exit_after_checkpoint: false
  derivatives_root: derivatives
  pipeline_name: preprocessing
  atomic_writes: true
  allow_resume_with_different_yaml: true
  validate_checkpoint_integrity: true
  backup_before_overwrite: false
  max_checkpoint_age_hours: 168

# ============================================================
# REPRODUCIBILITY CONTROLS
# ============================================================
repro:
  random_state_global: 42
  record_environment: true

# ============================================================
# METADATA CORRECTIONS
# ============================================================
metadata_fixes:
  fix_non_eeg_channels: {}
  fix_generic: {}
  expert_patch: |
    print("✅ Expert patch executed successfully.")
    