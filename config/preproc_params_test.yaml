# ===== IDENTIFIERS =====
subject: "003"
session: "01"
task: "test"
# no "run" because the file uses split-01 instead of run-*
bids_root: /Users/gm33/data/fairy

# ===== HYBRID / REMOTE I/O (OFF) =====
remote_io:
  enabled: false
  hpc_host: transfer-milgram.ycrc.yale.edu
  hpc_user: gm33
  remote_bids_root: /gpfs/milgram/pi/nobre/meg_shared/fairy/bids
  local_temp_dir: ./temp

# ===== CALIBRATION (used if you run Maxwell/tSSS) =====
calibration_file: cals/sss_cal_factory_20230619.dat
cross_talk_file: cals/ct_sparse_triux2.fif

# ===== BASICS =====
head_movement:
  enabled: true

line_freq: 60.0
stim_include_mask: 0xFFFF
head_position_origin: null

# ===== TRIGGERS =====
triggers:
  stim_channel: "STI101"
  mask: "0x00FF"
  max_settle_ms: 6.0
  refractory_ms: 20.0
  auto_mask_stuck_bits: false
  stuck_high_frac: 0.98
  stuck_low_frac: 0.02

# ===== EEG (none in this dataset) =====
eeg_handling:
  montage: null

# ===== INTERACTIVE CONTROLS =====
interactive_bad_channels: true
interactive_ica: true

# ===== MANUAL OVERRIDES =====
manual_bad_channels: []
ica_exclude_eeg: []
ica_exclude_meg: []

# ===== AUTOREJECT (optional) =====
autoreject:
  enabled: true
  which_types: [mag]
  filter: { highpass: 1.0, lowpass: 40.0, resample_hz: null }
  epoch:  { duration: 2.0, tmin: 0.0, tmax: 2.0 }
  cv_folds: 7
  thresh_method: 'random_search'
  n_interpolate: [0]
  verbose: true
  consensus_thresh: 0.3
  global_epoch_thresh: 0.5

# ===== ICA PREP (MEG only will be used) =====
ica_preprocessing:
  eeg:
    highpass: 1.0
    lowpass: 40.0
    resample_hz: 200
    max_ica_duration_sec: 1800
    interactive: true
    random_state: 97
  meg:
    highpass: 1.0
    lowpass: 40.0
    resample_hz: 200
    max_ica_duration_sec: 1800
    interactive: true
    random_state: 97

# ===== FINAL FILTER / SAVE =====
final_filter:
  highpass: null
  lowpass: null
  resample_hz: null
  drop_channel_types: [hpi, hlc, coil]

# ===== CHECKPOINTS =====
checkpoint:
  enabled: true
  exit_after_checkpoint: false
  derivatives_root: derivatives
  pipeline_name: preprocessing
  atomic_writes: true
  allow_resume_with_different_yaml: true
  validate_checkpoint_integrity: true
  backup_before_overwrite: false
  max_checkpoint_age_hours: 168

# ===== REPRO / LOGGING =====
repro:
  random_state_global: 42
  record_environment: true

# ===== METADATA PATCH HOOK =====
metadata_fixes:
  fix_non_eeg_channels: {}
  fix_generic: {}
  expert_patch: |
    print("✅ Expert patch executed successfully.")