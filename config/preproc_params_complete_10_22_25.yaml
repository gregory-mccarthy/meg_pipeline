# ============================================================
# MEG/EEG Preprocessing Configuration — Local Test Subject
# ============================================================
# This master template includes every field currently recognized
# by your preprocessing pipeline (v26+). It supports both local
# and hybrid (HPC) workflows. Non-applicable blocks are explicitly
# disabled (enabled: false) for clarity.
# ============================================================

# ============================================================
# LAB DEFAULT CONFIG INHERITANCE
# ============================================================
# The 'lab_defaults' key specifies a shared YAML file whose
# values are recursively merged into this config.
# Fields defined below override the defaults.
# ============================================================
#lab_defaults: /Users/gm33/repos/meg_pipeline/config/lab_defaults.yaml


# ------------------------------------------------------------
# BIDS DATASET IDENTIFIERS
# ------------------------------------------------------------
subject: "999"
session: "01"
task: "test"
run: null                # optional; leave null if no run field
bids_root: /Users/gm33/data/test_dataset

# ------------------------------------------------------------
# HYBRID / REMOTE I/O
# ------------------------------------------------------------
# Enables data fetching from and pushing to a remote HPC system.
# For local runs, keep enabled: false.
# ------------------------------------------------------------
remote_io:
  enabled: false
  hpc_host: transfer-milgram.ycrc.yale.edu
  hpc_user: gm33
  remote_bids_root: /gpfs/milgram/pi/nobre/meg_shared/test_dataset/bids
  local_temp_dir: ./temp

# ------------------------------------------------------------
# MAXWELL FILTERING (tSSS) CALIBRATION
# ------------------------------------------------------------
# Paths relative to repository root if not absolute.
# ------------------------------------------------------------
calibration_file: cals/sss_cal_factory_20230619.dat
cross_talk_file: cals/ct_sparse_triux2.fif

# ------------------------------------------------------------
# BASIC SIGNAL PROCESSING
# ------------------------------------------------------------
head_movement:
  enabled: true           # enable head-motion tracking if available

line_freq: 60.0            # power-line frequency (Hz)
stim_include_mask: 0xFFFF  # which trigger bits to include
head_position_origin: null # e.g., [0.0, 0.0, 0.04] if using manual origin

# ------------------------------------------------------------
# TRIGGERS
# ------------------------------------------------------------
triggers:
  stim_channel: "STI101"
  mask: "0x00FF"
  max_settle_ms: 6.0
  refractory_ms: 20.0
  auto_mask_stuck_bits: false
  stuck_high_frac: 0.98
  stuck_low_frac: 0.02

# ------------------------------------------------------------
# EEG MONTAGE CONFIGURATION
# ------------------------------------------------------------
# Ignored if no EEG data are present.
# ------------------------------------------------------------
eeg_handling:
  montage: null

# ------------------------------------------------------------
# INTERACTIVE PROCESSING CONTROLS
# ------------------------------------------------------------
interactive_bad_channels: true
interactive_ica: true

# ------------------------------------------------------------
# MANUAL OVERRIDES
# ------------------------------------------------------------
manual_bad_channels: []
ica_exclude_eeg: []
ica_exclude_meg: []

# ------------------------------------------------------------
# AUTOREJECT ARTIFACT DETECTION
# ------------------------------------------------------------
autoreject:
  enabled: true
  which_types: [mag, grad]   # can include multiple sensor types
  filter:
    highpass: 1.0
    lowpass: 40.0
    resample_hz: null
  epoch:
    duration: 2.0
    tmin: 0.0
    tmax: 2.0
  cv_folds: 7
  thresh_method: "random_search"   # or "bayesian_optimization"
  n_interpolate: [0]
  verbose: true
  consensus_thresh: 0.3
  global_epoch_thresh: 0.5

# ------------------------------------------------------------
# INDEPENDENT COMPONENT ANALYSIS (ICA)
# ------------------------------------------------------------
ica_preprocessing:
  eeg:
    highpass: 1.0
    lowpass: 40.0
    resample_hz: 200
    max_ica_duration_sec: 1800
    interactive: true
    random_state: 97
  meg:
    highpass: 1.0
    lowpass: 40.0
    resample_hz: 200
    max_ica_duration_sec: 1800
    interactive: true
    random_state: 97

# ------------------------------------------------------------
# FINAL OUTPUT PROCESSING
# ------------------------------------------------------------
final_filter:
  highpass: null
  lowpass: null
  resample_hz: null
  drop_channel_types:
    - hpi
    - hlc
    - coil

# ------------------------------------------------------------
# CHECKPOINT AND RESUME SYSTEM
# ------------------------------------------------------------
checkpoint:
  enabled: true
  exit_after_checkpoint: false
  derivatives_root: derivatives
  pipeline_name: preprocessing
  atomic_writes: true
  allow_resume_with_different_yaml: true
  validate_checkpoint_integrity: true
  backup_before_overwrite: false
  max_checkpoint_age_hours: 168

# ------------------------------------------------------------
# REPRODUCIBILITY CONTROLS
# ------------------------------------------------------------
repro:
  random_state_global: 42
  record_environment: true

# ------------------------------------------------------------
# METADATA CORRECTIONS
# ------------------------------------------------------------
metadata_fixes:
  fix_non_eeg_channels: {}
  fix_generic: {}
  expert_patch: |
    print("✅ Expert patch executed successfully.")

# ------------------------------------------------------------
# OPTIONAL FUTURE EXTENSIONS (DISABLED)
# ------------------------------------------------------------
# You can enable these later without breaking older configs.
# ------------------------------------------------------------
auxiliary_logs:
  enabled: false
  path: null

behavioral_triggers:
  enabled: false
  source: null