# ==== BIDS & run list ====
bids_root: "/Users/gm33/data/fairy"

inputs:
  - subject: "01"
    session: "01"
    task: "faces"
    run: "01"

# ==== Outputs (single block!) ====
outputs:
  save_evokeds: true
  save_epochs: true
  evokeds_subdir: "derivatives/avg"
  epochs_subdir: "derivatives/epochs"
  combined_evokeds: true        # write single all-in-one -ave.fif
  combined_desc: "all"          # controls desc-<...> in the filename

# Read ONLY the derivative file:
derivatives_subdir: "derivatives/preprocessing"
derivatives_desc: "preproc"

# === Event source and timing correction ===
events:
  source: "annot_timing_stim_codes"
  base: "rel"
  tolerance_sec: 0.002
  regex: "TRIG/(\\d+)"
  offset_ms: -75
  # If you truly want a -75 ms global shift, set samples instead (example at 1000 Hz):
  # alignment_correction_samples: -75
  verify_against_stim: true
  notes: "Trigger codes were written 75 ms after true visual onset (per experimenter)."

# ==== Global defaults ====
stim_channel: "STI101"

tmin: -0.1
tmax: 0.5
baseline: [null, 0.0]

use_reject: false
reject:
  mag: 4e-12
  grad: 4000e-13
  eeg: 100e-6

filter:
  l_freq: null
  h_freq: null

artifact_suppression: { window: null }

# ==== Conditions (expression-based) ====
# - Face identity = bits 1–3 (mask 0x007)
# - ISI/Context   = bits 4–6 (mask 0x038)
# - Target flag   = bit 7     (mask 0x040)
conditions:
  faces_non_target:
    expr: "((val & 0x38) != 0) and ((val & 0x40) == 0)"
  faces_target:
    expr: "((val & 0x40) != 0)"

epoch_windows:
  faces_non_target: { tmin: -0.1, tmax: 0.5 }
  faces_target:     { tmin: -0.1, tmax: 0.5 }
