# ============================================================
# MEG/EEG Preprocessing Configuration - Local Processing Mode
# ============================================================
# Local workflow: process data directly from local BIDS directory
# Two-stage pipeline with automated artifact rejection followed
# by interactive ICA review.
# ============================================================

# BIDS Dataset
subject: "015"
session: "01"
run: "01"
task: "mns"
bids_root: /Users/gm33/PythonProject/temp/bids

# ============================================================
# HYBRID PROCESSING I/O - DISABLED FOR LOCAL PROCESSING
# ============================================================
remote_io:
  enabled: false  # Changed to false for local processing
  # hpc_host: transfer-milgram.ycrc.yale.edu  # Not needed for local
  # hpc_user: gm33  # Not needed for local
  # remote_bids_root: /gpfs/milgram/pi/nobre/meg_shared/epilepsy/epi  # Not needed
  # local_temp_dir: ./temp  # Not needed

# Signal Processing
head_movement:
  enabled: true
line_freq: 60.0
stim_include_mask: 0xFFFF
head_position_origin: null
#head_position_origin: [0, 0, 0.04]  # in meters, typical head center

# Maxwell Filtering Calibration
calibration_file: cals/sss_cal_factory_20230619.dat
cross_talk_file: cals/ct_sparse_triux2.fif

# EEG Configuration
eeg_handling:
  montage: null

# Interactive Controls
interactive_bad_channels: true
manual_bad_channels: []
ica_exclude_eeg: []
ica_exclude_meg: []

# Autoreject Artifact Detection
autoreject:
  enabled: true
  which_types: [mag]  # Removed 'eeg' since no EEG data present
  filter:
    highpass: 1.0
    lowpass: 40.0
    resample_hz: null
  epoch:
    duration: 2.0
    tmin: 0.0
    tmax: 2.0
  cv_folds: 5
  thresh_method: 'random_search'
  n_interpolate: [0]
  consensus_thresh: 0.3
  global_epoch_thresh: 0.5

# ICA Preprocessing
ica_preprocessing:
  eeg:
    highpass: 1.0
    lowpass: 40.0
    resample_hz: 200
    max_ica_duration_sec: 1800
    interactive: true
    random_state: 97
  meg:
    highpass: 1.0
    lowpass: 40.0
    resample_hz: 200
    max_ica_duration_sec: 1800
    interactive: true
    random_state: 97

# Final Processing
final_filter:
  highpass: null
  lowpass: null
  resample_hz: null
  drop_channel_types:
    - hpi
    - hlc
    - coil
    - eeg

# Checkpoint System
checkpoint:
  enabled: true
  exit_after_checkpoint: false
  derivatives_root: derivatives
  pipeline_name: preprocessing
  atomic_writes: true
  allow_resume_with_different_yaml: false
  validate_checkpoint_integrity: true
  backup_before_overwrite: false
  max_checkpoint_age_hours: 168

# Reproducibility
repro:
  random_state_global: 42
  record_environment: true

# Metadata Fixes
metadata_fixes:
  fix_non_eeg_channels: {}
  fix_generic: {}
  expert_patch: |
    print("✅ Expert patch executed successfully.")
